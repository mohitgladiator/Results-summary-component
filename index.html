<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Figtree:ital,wght@0,300..900;1,300..900&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Results summary component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "outfit", sans-serif;
        background-color: hsl(221, 100%, 96%);
      }
      .container {
        background-color: hsl(0, 0%, 100%);
        width: 600px;

        display: flex;
        border-radius: 15px;
      }
      .left {
        flex: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        background: linear-gradient(hsl(252, 100%, 67%), hsl(241, 81%, 54%));
        border-radius: 15px;
        align-items: center;
        padding: 2em 1.5em;
      }
      .left_heading {
        color: hsl(255, 31%, 90%);
        font-weight: 500;
        font-size: 1.38rem;
        margin-bottom: 1.2rem;
      }
      .circle {
        border-radius: 50%;
        height: 200px;
        width: 200px;
        background: linear-gradient(
          hsla(256, 72%, 46%, 1),
          hsla(241, 72%, 46%, 0)
        );
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        margin-bottom: 15px;
      }
      .score {
        font-family: "outfit", sans-serif;
        font-size: 4.5rem;
        color: white;
        font-weight: 800;
      }
      .totalscore {
        color: hsl(255, 31%, 90%);
        font-family: "outfit", sans-serif;
        font-weight: 500;
      }
      .conclusion {
        font-family: "Funnel Sans", sans-serif;

        font-weight: 700;
        font-size: 1.5rem;
        color: white;
        margin-bottom: 10px;
      }
      .conclusionparagraph {
        color: hsl(255, 31%, 90%);
        font-size: 1rem;
        text-align: center;
      }
      .right {
        border-radius: 15px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 1.8em;
      }
      .right_heading {
        font-size: 1.1rem;
      }
      .icons {
        max-width: 100%;
        height: auto;
      }
      .card {
        display: flex;
        width: 100%;
        /* height: 40px; */
        justify-content: space-between;
        align-items: center;
        flex: 1;
        background-color: hsla(241, 100%, 89%, 0.25);
        border-radius: 15px;
        padding: 1em;
      }
      .subject {
        display: flex;
        justify-content: center;
        gap: 5px;
        text-align: center;
        font-size: 1rem;
      }
      #reaction {
        color: hsl(0, 100%, 67%);
      }

      #memory {
        color: hsl(39, 100%, 56%);
      }
      #verbal {
        color: hsl(166, 100%, 37%);
      }
      #visual {
        color: hsl(234, 85%, 45%);
      }
      .marks {
        font-weight: 500;
        font-size: 1.1rem;
      }
      .totalmarks {
        color: hsl(0, 0%, 60%);
      }
      @media (max-width: 650px) {
        .container {
          flex-direction: column;
          width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h2 class="left_heading">Your Result</h2>
        <div class="circle">
          <span class="score">76</span>
          <span class="totalscore">of 100</span>
        </div>
        <span class="conclusion">Great</span>
        <span class="conclusionparagraph"
          >You scored higher than 65% of<br />
          the people who have taken<br />
          these tests.</span
        >
      </div>

      <div class="right">
        <h1 class="right_heading">Summary</h1>
        <div class="card">
          <span id="reaction" class="subject">
            <img
              class="icons"
              src="./assets/images/icon-reaction.svg"
              alt="memory_icon"
            />Reaction</span
          >
          <span class="marks">80 <span class="totalmarks">/ 100</span></span>
        </div>
        <div class="card">
          <span id="memory" class="subject"
            ><img
              class="icons"
              src="./assets/images/icon-memory.svg"
              alt="memory_icon"
            />
            Memory</span
          >
          <span class="marks">92 <span class="totalmarks">/ 100</span></span>
        </div>
        <div class="card">
          <span id="verbal" class="subject">
            <img
              class="icons"
              src="./assets/images/icon-verbal.svg"
              alt="memory_icon"
            />Verbal</span
          >
          <span class="marks"> 61 <span class="totalmarks">/ 100</span></span>
        </div>
        <div class="card">
          <span id="visual" class="subject">
            <img
              class="icons"
              src="./assets/images/icon-visual.svg"
              alt="memory_icon"
            />Visual</span
          >
          <span class="marks"> 72 <span class="totalmarks">/ 100</span></span>
        </div>
      </div>
    </div>

    <!--  76 of 100 Great You scored higher than 65% of the people who
    have taken these tests.    Memory    Continue -->

  </body>
</html>
