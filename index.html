<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Figtree:ital,wght@0,300..900;1,300..900&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h2 class="left_heading">Your Result</h2>
        <div class="circle">
          <span class="score">76</span>
          <span class="totalscore">of 100</span>
        </div>
        <span class="conclusion">Great</span>
        <span class="conclusionparagraph"
          >You scored higher than 65% of the people who have taken these
          tests.</span
        >
      </div>

      <div class="right">
        <h1 class="right_heading">Summary</h1>
        <div class="grid">
          <div class="card">
            <span id="reaction" class="subject">
              <img
                class="icons"
                src="icon-reaction.svg"
                alt="memory_icon"
              />Reaction</span
            >
            <span class="marks">80 <span class="totalmarks">/ 100</span></span>
          </div>
          <div class="card">
            <span id="memory" class="subject"
              ><img
                class="icons"
                src="icon-memory.svg"
                alt="memory_icon"
              />
              Memory</span
            >
            <span class="marks">92 <span class="totalmarks">/ 100</span></span>
          </div>
          <div class="card">
            <span id="verbal" class="subject">
              <img
                class="icons"
                src="icon-verbal.svg"
                alt="memory_icon"
              />Verbal</span
            >
            <span class="marks"> 61 <span class="totalmarks">/ 100</span></span>
          </div>
          <div class="card">
            <span id="visual" class="subject">
              <img
                class="icons"
                src="icon-visual.svg"
                alt="memory_icon"
              />Visual</span
            >
            <span class="marks"> 72 <span class="totalmarks">/ 100</span></span>
          </div>
          <button class="btn">Continue</button>
        </div>
      </div>
    </div>

    <!--  76 of 100 Great You scored higher than 65% of the people who
    have taken these tests.    Memory    Continue -->

    </footer> -->
  </body>
</html>
